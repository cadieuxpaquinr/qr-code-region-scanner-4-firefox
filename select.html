<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body { margin: 0; height: 100%; background: #111; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; cursor: crosshair; }
    #shot { display: block; max-width: 100vw; max-height: 100vh; user-select: none; -moz-user-select: none; }
    #hint { position: fixed; top: 0; left: 0; right: 0; padding: 6px 10px; text-align: center;
      font: 13px system-ui, sans-serif; color: #fff; background: rgba(0, 0, 0, 0.55); }
    #box { position: fixed; display: none; border: 2px dashed #4cc9f0;
      background: rgba(76, 201, 240, 0.1); pointer-events: none; }
  </style>
</head>
<body>
  <div id="hint">Drag over the QR code. Press Esc to cancel.</div>
  <img id="shot" alt="">
  <div id="box"></div>
  <script src="vendor/jsqr.js"></script>
  <script src="scan-core.js"></script>
  <script src="select.js"></script>
</body>
</html>
